<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taglio sottotronchi e Liste a misura - Calcolo Kg</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<h1>Taglio sottotronchi e Liste a misura - Calcolo Kg</h1>

<div class="box">
    <label>Tipo:</label>
    <select id="tipo" onchange="updateGrammature()">
        <option value="Sottotronchi">Sottotronchi</option>
        <option value="Liste">Liste</option>
    </select>
</div>

<div class="box">
    <label>Grammatura:</label>
    <select id="grammatura"></select>
</div>

<button id="addRowBtn" onclick="aggiungiRiga()">➕ Nuova riga</button>

<div id="righe"></div>

<h2 id="totali"></h2>

<button id="copyBtn" onclick="copiaRiepilogo()">📋 Copia riepilogo</button>
<p id="copyStatus"></p>

<script src="app.js"></script>
</body>
</html>
